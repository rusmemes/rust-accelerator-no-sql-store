syntax = "proto3";
import "common.proto";

package manager_api.v1;

service ManagerApi {
  rpc OpenConnection(stream ManagerEvent) returns (stream ManagerEvent);
  rpc OpenWorkerConnection(stream WorkerEvent) returns (stream WorkerEvent);
}

message Connect {
  string id = 1;
  common.v1.Addr addr = 2;
  common.v1.Config config = 3;
}

message ConnectResponse {
  string id = 1;
}

message Heartbeat {
  string id = 1;
  uint64 ts = 2;
}

message VoteRequest {
  uint64 epoch = 1;
  uint64 ts = 2;
}

message VoteResponse {
  string leader_id = 1;
  uint64 ts = 2;
}

message Leader {
  string id = 1;
  uint64 epoch = 2;
  uint64 ts = 3;
}

message ManagerEvent {
  oneof payload {
    Connect connect = 1;
    ConnectResponse connect_response = 2;
    Heartbeat heartbeat = 3;
    common.v1.GetState get_cluster_state = 4;
    common.v1.ClusterState cluster_state = 5;
    VoteRequest vote_request = 6;
    VoteResponse vote_response = 7;
    Leader leader = 8;
  }
}

message WorkerEvent {
  oneof payload {
    Connect connect = 1;
    ConnectResponse connect_response = 2;
    Heartbeat heartbeat = 3;
    common.v1.GetState get_cluster_state = 4;
    common.v1.ClusterState cluster_state = 5;
    Leader manager_leader = 6;
  }
}
