syntax = "proto3";
import "common.proto";

package manager_api.v1;

service ManagerApi {
  rpc OpenConnection(stream Message) returns (stream Message);
}

message Connect {
  string id = 1;
  common.v1.Addr addr = 2;
}

message ConnectResponse {
  string id = 1;
}

message Heartbeat {
  string id = 1;
  uint64 ts = 2;
}

message VoteRequest {
  uint64 epoch = 1;
  uint64 ts = 2;
}

message VoteResponse {
  string leader_id = 1;
  uint64 ts = 2;
}

message Leader {
  string id = 1;
  uint64 epoch = 2;
  uint64 ts = 3;
}

message Message {
  oneof payload {
    Connect connect = 1;
    Heartbeat heartbeat = 2;
    common.v1.GetClusterState get_cluster_state = 3;
    common.v1.ClusterState cluster_state = 4;
    VoteRequest vote_request = 5;
    VoteResponse vote_response = 6;
    Leader leader = 7;
    ConnectResponse connect_response = 8;
  }
}
