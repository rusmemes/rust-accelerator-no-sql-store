syntax = "proto3";

package common.v1;

message GetState {}

message Addr {
  string host = 1;
  uint32 port = 2;
}

message Manager {
  string id = 1;
  Addr addr = 2;
  uint64 last_heartbeat = 3;
}

message Worker {
  string id = 1;
  Addr addr = 2;
  uint64 last_heartbeat = 3;
  repeated uint32 masters = 4;
  repeated uint32 replicas = 5;
}

message Node {
  oneof payload {
      Manager manager = 1;
      Worker worker = 2;
  }
}

message ClusterState {
  uint64 epoch = 1;
  string leader_id = 2;
  repeated Node nodes = 3;
  optional Config config = 4;
}

message Config {
  uint32 replication_factor = 1;
}
